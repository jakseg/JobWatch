name: JobWatch — Check Career Pages

on:
  schedule:
    - cron: "0 7 * * *" # Daily at 07:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run JobWatch
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m src.main

      - name: Commit updated state
        run: |
          git config user.name "jobwatch-bot"
          git config user.email "jobwatch-bot@users.noreply.github.com"
          git add data/state.json
          git diff --cached --exit-code || git commit -m "Update state.json [skip ci]"
          git pull --rebase
          git push
